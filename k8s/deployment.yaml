# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: kubenews
---
# Secret com credenciais do banco
apiVersion: v1
kind: Secret
metadata:
  name: kubenews-secret
  namespace: kubenews
type: Opaque
stringData:
  DB_DATABASE: kubenews
  DB_USERNAME: kubenews
  DB_PASSWORD: pg1234
---
# StatefulSet do PostgreSQL
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgre
  namespace: kubenews
spec:
  serviceName: postgre
  replicas: 1
  selector:
    matchLabels:
      app: postgre
  template:
    metadata:
      labels:
        app: postgre
    spec:
      containers:
        - name: postgre
          image: postgres:13.13
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kubenews-secret
                  key: DB_PASSWORD
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: kubenews-secret
                  key: DB_USERNAME
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: kubenews-secret
                  key: DB_DATABASE
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "kubenews", "-d", "kubenews"]
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "kubenews", "-d", "kubenews"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: postgre-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgre-data
      spec:
        storageClassName: local-path
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
# Service do PostgreSQL (ClusterIP - acesso apenas interno)
apiVersion: v1
kind: Service
metadata:
  name: postgre
  namespace: kubenews
spec:
  selector:
    app: postgre
  ports:
    - port: 5432
---
# Deployment da aplicação kube-news
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubenews
  namespace: kubenews
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kubenews
  template:
    metadata:
      labels:
        app: kubenews
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:13.13
          command: ['sh', '-c', 'until pg_isready -h postgre -p 5432 -U kubenews; do echo "Aguardando PostgreSQL..."; sleep 3; done']
      containers:
        - name: kubenews
          image: albertohco/kube-news:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: DB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: kubenews-secret
                  key: DB_DATABASE
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kubenews-secret
                  key: DB_PASSWORD
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: kubenews-secret
                  key: DB_USERNAME
            - name: DB_HOST
              value: postgre
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
---
# Service da aplicação (NodePort para acesso local)
apiVersion: v1
kind: Service
metadata:
  name: kubenews
  namespace: kubenews
spec:
  selector:
    app: kubenews
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080
  type: NodePort

